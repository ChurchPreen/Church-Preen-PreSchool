<head>

<title>Admin Login – Church Preen Pre-School</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#fff3eb 0%,#fff9f0 50%,#f0faff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:white;border-radius:20px;padding:2.5rem 2rem;box-shadow:0 8px 40px rgba(255,107,53,0.15);width:100%;max-width:420px;text-align:center;border:2px solid #B3D9FF;}
img{width:120px;margin:0 auto 1.25rem;display:block;}
h1{font-family:'Baloo 2',sans-serif;font-size:1.6rem;color:#1E90FF;margin-bottom:.25rem;}
.sub{font-size:.88rem;color:#888;margin-bottom:2rem;}
.field{text-align:left;margin-bottom:1rem;}
label{display:block;font-size:.78rem;font-weight:700;color:#555;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em;}
input{width:100%;padding:.75rem 1rem;border:2px solid #B3D9FF;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;outline:none;transition:border .2s;}
input:focus{border-color:#1E90FF;}
.btn{width:100%;padding:.85rem;background:#1E90FF;color:white;border:none;border-radius:10px;font-family:'Baloo 2',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:.5rem;box-shadow:0 4px 0 #1570CC;transition:all .2s;}
.btn:hover{background:#e55a28;transform:translateY(-1px);}
.btn:active{transform:translateY(1px);box-shadow:0 2px 0 #c04d22;}
.error{background:#fdecea;color:#c0271e;border-radius:10px;padding:.7rem 1rem;font-size:.88rem;font-weight:700;margin-bottom:1rem;display:none;border:1px solid #f8c8c6;}
.hint{margin-top:1.5rem;font-size:.78rem;color:#bbb;line-height:1.7;}
.hint a{color:#1E90FF;}
</style>
</head>

  <h1>Website Admin</h1>
  <p class="sub">Church Preen Pre-School</p>
  <div class="error" id="err"></div>
  <div class="field">
    <label>Admin Password</label>
    <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="field">
    <label>GitHub Token <span style="color:#1E90FF;font-size:.72rem;">(to save changes live)</span></label>
    <input type="password" id="tok" placeholder="ghp_xxxxxxxxxxxx" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" onclick="login()">Log In →</button>
  <p class="hint">
    Need a GitHub token? <a href="https://github.com/settings/tokens/new" target="_blank">Create one here</a> — tick the <strong>repo</strong> box.<br><br>
    Forgot the password? Ask your website administrator.
  </p>
</div>
<script>
const ADMIN_PASSWORD = 'ChurchPreen2025!';
function login() {
  const pw = document.getElementById('pw').value;
  const tok = document.getElementById('tok').value.trim();
  const err = document.getElementById('err');
  if (pw !== ADMIN_PASSWORD) { err.textContent = '❌ Incorrect password. Please try again.'; err.style.display='block'; return; }
  if (!tok) { err.textContent = '❌ Please enter your GitHub token.'; err.style.display='block'; return; }
  sessionStorage.setItem('cp_admin','1');
  sessionStorage.setItem('cp_token',tok);
  err.style.display='none';
  window.location.href='dashboard.html';
}
</script>
